<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

  <title>Cadastro de Tarefas</title>

  <!-- Evita que o navegador "pinte" a aba com a cor do cabeçalho -->
  <meta name="theme-color" content="#ffffff">

  <!-- Fonte Quicksand, deixa o visual mais arredondado e amigável -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>

<body>
  <main class="container">

    <!-- Cabeçalho com gradiente, inspirado nos apps de to-do =) -->
    <header class="topo">
      <h1>Minhas Tarefas</h1>
    </header>

    <!-- Gatinho decorativo -->
    <div class="gato">
      <img src="img/cat.png" alt="Gato espiando">
    </div>

    <form id="formulario">
      <input
        id="tarefa"
        type="text"
        placeholder="Nova tarefa"
      >
      <button type="submit">Adicionar</button>
    </form>

    <p id="mensagem"></p>

    <ul id="lista"></ul>

  </main>

  <script src="script.js"></script>
</body>
</html>
